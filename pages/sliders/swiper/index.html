<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Swiper Carousel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  <link rel="icon" href="../../../assets/images/logo.png" type="image/png">
  <link rel="stylesheet" href="../../../assets/css/swiper.css">
  <link rel="stylesheet" href="../../../assets/css/home-btn.css">
</head>

<body>
  <div class="swiper mySwiper">
    <div class="swiper-wrapper">
        <div class="swiper-slide">
            <img src="../../../assets/images/slider5/image1.jpg" alt="Imagen 1">
        </div>
        <div class="swiper-slide">
            <img src="../../../assets/images/slider5/image2.jpg" alt="Imagen 2">
        </div>
        <div class="swiper-slide">
            <img src="../../../assets/images/slider5/image3.jpg" alt="Imagen 3">
        </div>
        <div class="swiper-slide">
            <img src="../../../assets/images/slider5/image4.jpg" alt="Imagen 4">
        </div>
        <div class="swiper-slide">
            <img src="../../../assets/images/slider5/image5.jpg" alt="Imagen 5">
        </div>
        <div class="swiper-slide">
            <img src="../../../assets/images/slider5/image6.jpg" alt="Imagen 6">
        </div>
        <div class="swiper-slide">
            <img src="../../../assets/images/slider5/image7.jpg" alt="Imagen 7">
        </div>
        <div class="swiper-slide">
            <img src="../../../assets/images/slider5/image8.jpg" alt="Imagen 8">
        </div>
        <div class="swiper-slide">
            <img src="../../../assets/images/slider5/image9.jpg" alt="Imagen 9">
        </div>
    </div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script src="../../../assets/js/swiper.js"></script>

  <a href="../../../index.html" class="home-btn" aria-label="Back to home">🏠</a>
</body>

</html>
