<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracking Capas Gratis - Antygravity IDE</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <script src="./assets/js/script.js"></script> 
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 Tracker De Agentes de IA</h1>
      <div class="actions">
        <button class="btn-primary" id="btnAdd">➕ Agregar</button>
        <button id="btnExport">📥 Exportar</button>
        <button id="btnImport">📤 Importar</button>
        <button id="themeToggle" class="theme-btn" title="Cambiar tema">🌙</button>
        <input type="file" id="importFile" accept=".json">
      </div>
    </header>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Gemini</th>
            <th>Claude</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">No hay cuentas registradas. Agregá una nueva.</div>
    </div>
  </div>

  <dialog id="modal">
    <!-- Sección formulario -->
    <div id="formSection">
      <h2 id="modalTitle">Nueva entrada</h2>
      <form id="entryForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="usuario@ejemplo.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="geminiDate">Fecha reinicio Gemini</label>
          <input type="date" id="geminiDate" required>
        </div>
        <div class="form-group">
          <label for="claudeDate">Fecha reinicio Claude</label>
          <input type="date" id="claudeDate" required>
        </div>
        <div class="dialog-actions">
          <button type="button" id="btnCancel">Cancelar</button>
          <button type="submit" class="btn-primary" id="btnSave">Guardar</button>
        </div>
      </form>
    </div>

    <!-- Sección confirmación -->
    <div id="confirmSection">
      <h2 id="confirmTitle">Confirmación</h2>
      <p id="confirmMessage"></p>
      <div class="dialog-actions">
        <button id="btnConfirmCancel">Cancelar</button>
        <button id="btnConfirmOk" class="btn-danger">Confirmar</button>
      </div>
    </div>
  </dialog>
</body>
</html>
