<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracking Capas Gratis - Antygravity IDE</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Variables de tema (por defecto claro) */
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --text: #1e293b;
      --text-secondary: #475569;
      --border: #e2e8f0;
      --shadow: rgba(0,0,0,0.04);
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger-bg: #fee2e2;
      --danger-text: #b91c1c;
      --danger-border: #fecaca;
      --header-bg: #f8fafc;
      --table-border: #f1f5f9;
      --button-bg: #ffffff;
      --button-border: #e2e8f0;
      --overlay: rgba(15, 23, 42, 0.4);
    }

    body.dark {
      --bg: #0f172a;
      --surface: #1e293b;
      --text: #f1f5f9;
      --text-secondary: #94a3b8;
      --border: #334155;
      --shadow: rgba(0,0,0,0.25);
      --accent: #60a5fa;
      --accent-hover: #3b82f6;
      --danger-bg: #7f1d1d;
      --danger-text: #fca5a5;
      --danger-border: #991b1b;
      --header-bg: #1e293b;
      --table-border: #334155;
      --button-bg: #1e293b;
      --button-border: #334155;
      --overlay: rgba(0,0,0,0.6);
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1rem;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    button, .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1.1rem;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--button-bg);
      color: var(--text);
      box-shadow: 0 1px 3px var(--shadow);
      border: 1px solid var(--button-border);
    }

    button:hover {
      background: var(--border);
      transform: translateY(-1px);
      box-shadow: 0 4px 8px var(--shadow);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-danger {
      background: var(--danger-bg);
      color: var(--danger-text);
      border-color: var(--danger-border);
    }
    .btn-danger:hover {
      background: var(--danger-border);
    }

    .theme-btn {
      font-size: 1.2rem;
      padding: 0.5rem;
      border-radius: 50%;
      aspect-ratio: 1;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 16px;
      background: var(--surface);
      box-shadow: 0 2px 12px var(--shadow);
      border: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 500px;
      white-space: nowrap;
    }

    th {
      background: var(--header-bg);
      padding: 0.9rem 1rem;
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--text-secondary);
      border-bottom: 2px solid var(--border);
      text-align: center;  /* Centrado */
    }

    td {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid var(--table-border);
      font-size: 0.9rem;
      text-align: center;  /* Centramos contenido de celdas también */
    }

    tr:last-child td {
      border-bottom: none;
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .dot-red { background: #ef4444; }
    .dot-yellow { background: #eab308; }
    .dot-green { background: #22c55e; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-secondary);
      font-size: 1rem;
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
    }

    /* Diálogo nativo centrado */
    dialog {
      border: none;
      border-radius: 20px;
      padding: 1.8rem;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
      background: var(--surface);
      color: var(--text);
      margin: auto;            /* Aseguramos centrado */
      animation: slideUp 0.25s ease;
    }

    dialog::backdrop {
      background: var(--overlay);
      backdrop-filter: blur(4px);
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    dialog h2 {
      margin-bottom: 1.2rem;
      font-size: 1.3rem;
    }

    .form-group {
      margin-bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    label {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    input {
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.95rem;
      background: var(--surface);
      color: var(--text);
      transition: border 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.25);
    }

    .dialog-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    #formSection, #confirmSection {
      display: none;
    }
    #formSection.active, #confirmSection.active {
      display: block;
    }

    #importFile {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 Capas Gratis</h1>
      <div class="actions">
        <button class="btn-primary" id="btnAdd">➕ Agregar</button>
        <button id="btnExport">📥 Exportar</button>
        <button id="btnImport">📤 Importar</button>
        <button id="themeToggle" class="theme-btn" title="Cambiar tema">🌙</button>
        <input type="file" id="importFile" accept=".json">
      </div>
    </header>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Gemini</th>
            <th>Claude</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">No hay cuentas registradas. Agregá una nueva.</div>
    </div>
  </div>

  <dialog id="modal">
    <!-- Sección formulario -->
    <div id="formSection">
      <h2 id="modalTitle">Nueva entrada</h2>
      <form id="entryForm" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="usuario@ejemplo.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="geminiDate">Fecha reinicio Gemini</label>
          <input type="date" id="geminiDate" required>
        </div>
        <div class="form-group">
          <label for="claudeDate">Fecha reinicio Claude</label>
          <input type="date" id="claudeDate" required>
        </div>
        <div class="dialog-actions">
          <button type="button" id="btnCancel">Cancelar</button>
          <button type="submit" class="btn-primary" id="btnSave">Guardar</button>
        </div>
      </form>
    </div>

    <!-- Sección confirmación -->
    <div id="confirmSection">
      <h2 id="confirmTitle">Confirmación</h2>
      <p id="confirmMessage"></p>
      <div class="dialog-actions">
        <button id="btnConfirmCancel">Cancelar</button>
        <button id="btnConfirmOk" class="btn-danger">Confirmar</button>
      </div>
    </div>
  </dialog>

  <script>
    (function() {
      const STORAGE_KEY = 'antygravity_tracking';
      const THEME_KEY = 'theme_preference';

      let entries = [];
      let currentEditId = null;
      let currentConfirmAction = null;
      let pendingDeleteId = null;
      let pendingImportFile = null;

      const tableBody = document.getElementById('tableBody');
      const emptyState = document.getElementById('emptyState');
      const modal = document.getElementById('modal');
      const formSection = document.getElementById('formSection');
      const confirmSection = document.getElementById('confirmSection');
      const modalTitle = document.getElementById('modalTitle');
      const entryForm = document.getElementById('entryForm');
      const emailInput = document.getElementById('email');
      const geminiDateInput = document.getElementById('geminiDate');
      const claudeDateInput = document.getElementById('claudeDate');
      const btnAdd = document.getElementById('btnAdd');
      const btnExport = document.getElementById('btnExport');
      const btnImport = document.getElementById('btnImport');
      const importFile = document.getElementById('importFile');
      const btnCancel = document.getElementById('btnCancel');
      const btnSave = document.getElementById('btnSave');
      const confirmTitle = document.getElementById('confirmTitle');
      const confirmMessage = document.getElementById('confirmMessage');
      const btnConfirmCancel = document.getElementById('btnConfirmCancel');
      const btnConfirmOk = document.getElementById('btnConfirmOk');
      const themeToggle = document.getElementById('themeToggle');

      // Obtener siguiente ID
      function getNextId() {
        if (entries.length === 0) return 1;
        return Math.max(...entries.map(e => e.id)) + 1;
      }

      // Cargar/guardar localStorage
      function loadFromStorage() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          try {
            entries = JSON.parse(raw);
            if (!Array.isArray(entries)) entries = [];
          } catch {
            entries = [];
          }
        } else {
          entries = [];
        }
        // Normalizar IDs
        entries.forEach((e, i) => {
          if (typeof e.id !== 'number' || isNaN(e.id)) {
            e.id = i + 1;
          }
        });
        entries.sort((a, b) => a.id - b.id);
      }

      function saveToStorage() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      }

      // Devuelve la clase del puntito según los días restantes
      function getDateDotClass(dateStr) {
        const today = new Date();
        today.setHours(0,0,0,0);
        const target = new Date(dateStr + 'T00:00:00');
        target.setHours(0,0,0,0);
        const diffDays = Math.ceil((target - today) / (1000 * 60 * 60 * 24));

        if (diffDays < 0) return 'dot-green';        // Ya pasó → disponible
        if (diffDays >= 5 && diffDays <= 7) return 'dot-red'; // Próximo (5-7 días)
        return 'dot-yellow';                          // Resto
      }

      function formatDate(dateStr) {
        if (!dateStr) return '—';
        const [year, month, day] = dateStr.split('-');
        return `${day}/${month}/${year}`;
      }

      function escapeHtml(text) {
        const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
        return text.replace(/[&<>"']/g, ch => map[ch]);
      }

      function renderTable() {
        if (entries.length === 0) {
          tableBody.innerHTML = '';
          emptyState.style.display = 'block';
          return;
        }
        emptyState.style.display = 'none';
        tableBody.innerHTML = entries.map(entry => {
          const gDot = getDateDotClass(entry.geminiDate);
          const cDot = getDateDotClass(entry.claudeDate);
          return `
            <tr>
              <td>${entry.id}</td>
              <td>${escapeHtml(entry.email)}</td>
              <td><span class="status-dot ${gDot}"></span>${formatDate(entry.geminiDate)}</td>
              <td><span class="status-dot ${cDot}"></span>${formatDate(entry.claudeDate)}</td>
              <td>
                <button class="btn-edit" data-id="${entry.id}" title="Editar">✏️</button>
                <button class="btn-delete btn-danger" data-id="${entry.id}" title="Eliminar">🗑️</button>
              </td>
            </tr>
          `;
        }).join('');
      }

      // Modal
      function showFormSection() {
        formSection.classList.add('active');
        confirmSection.classList.remove('active');
      }

      function showConfirmSection(title, message) {
        confirmTitle.textContent = title;
        confirmMessage.textContent = message;
        formSection.classList.remove('active');
        confirmSection.classList.add('active');
      }

      function openModalForAdd() {
        currentEditId = null;
        modalTitle.textContent = 'Nueva entrada';
        entryForm.reset();
        btnSave.textContent = 'Guardar';
        showFormSection();
        modal.showModal();
        emailInput.focus();
      }

      function openModalForEdit(entry) {
        currentEditId = entry.id;
        modalTitle.textContent = 'Editar entrada';
        emailInput.value = entry.email;
        geminiDateInput.value = entry.geminiDate;
        claudeDateInput.value = entry.claudeDate;
        btnSave.textContent = 'Actualizar';
        showFormSection();
        modal.showModal();
        emailInput.focus();
      }

      function closeModal() {
        modal.close();
        currentEditId = null;
        pendingDeleteId = null;
        pendingImportFile = null;
        currentConfirmAction = null;
        entryForm.reset();
      }

      // Validación con email duplicado
      function isEmailDuplicate(email, excludeId = null) {
        return entries.some(e => e.email === email && e.id !== excludeId);
      }

      function validateForm() {
        const email = emailInput.value.trim();
        const gemini = geminiDateInput.value;
        const claude = claudeDateInput.value;

        if (!email || !gemini || !claude) {
          alert('Todos los campos son obligatorios.');
          return false;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          alert('Ingresá un email válido.');
          return false;
        }
        if (isEmailDuplicate(email, currentEditId)) {
          alert('Ya existe una cuenta con ese email.');
          return false;
        }
        return true;
      }

      function handleFormSubmit(e) {
        e.preventDefault();
        if (!validateForm()) return;

        const email = emailInput.value.trim();
        const geminiDate = geminiDateInput.value;
        const claudeDate = claudeDateInput.value;

        if (currentEditId !== null) {
          const entry = entries.find(e => e.id === currentEditId);
          if (entry) {
            entry.email = email;
            entry.geminiDate = geminiDate;
            entry.claudeDate = claudeDate;
          }
        } else {
          entries.push({
            id: getNextId(),
            email,
            geminiDate,
            claudeDate
          });
        }

        entries.sort((a, b) => a.id - b.id);
        saveToStorage();
        renderTable();
        closeModal();
      }

      // Eliminar
      function requestDelete(id) {
        pendingDeleteId = id;
        currentConfirmAction = 'delete';
        showConfirmSection('Eliminar cuenta', '¿Estás seguro de eliminar esta cuenta? Esta acción no se puede deshacer.');
        modal.showModal();
      }

      function executeDelete() {
        if (pendingDeleteId) {
          entries = entries.filter(e => e.id !== pendingDeleteId);
          saveToStorage();
          renderTable();
        }
        closeModal();
      }

      // Exportar
      function exportData() {
        const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `tracking_capas_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
      }

      // Importar
      function requestImport(file) {
        pendingImportFile = file;
        currentConfirmAction = 'import';
        showConfirmSection('Importar datos', 'Se perderán todos los datos actuales y serán reemplazados por los del archivo. ¿Desea continuar?');
        modal.showModal();
      }

      function executeImport() {
        if (!pendingImportFile) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const imported = JSON.parse(e.target.result);
            if (!Array.isArray(imported)) {
              alert('El archivo no contiene un arreglo válido.');
              return;
            }
            const valid = imported.every(item => item.email && item.geminiDate && item.claudeDate);
            if (!valid) {
              alert('Algunos registros no tienen email, geminiDate o claudeDate.');
              return;
            }
            entries = imported.map((item, index) => ({
              id: index + 1,
              email: item.email,
              geminiDate: item.geminiDate,
              claudeDate: item.claudeDate
            }));
            saveToStorage();
            renderTable();
            alert('Datos importados correctamente.');
          } catch (err) {
            alert('Error al leer el archivo JSON.');
          } finally {
            closeModal();
          }
        };
        reader.readAsText(pendingImportFile);
      }

      function handleConfirmOk() {
        if (currentConfirmAction === 'delete') executeDelete();
        else if (currentConfirmAction === 'import') executeImport();
      }

      // Tema
      function applyTheme(theme) {
        if (theme === 'dark') {
          document.body.classList.add('dark');
          themeToggle.textContent = '☀️';
        } else {
          document.body.classList.remove('dark');
          themeToggle.textContent = '🌙';
        }
      }

      function detectSystemTheme() {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function loadTheme() {
        const saved = localStorage.getItem(THEME_KEY);
        const theme = saved || detectSystemTheme();
        applyTheme(theme);
      }

      function toggleTheme() {
        const isDark = document.body.classList.contains('dark');
        const newTheme = isDark ? 'light' : 'dark';
        localStorage.setItem(THEME_KEY, newTheme);
        applyTheme(newTheme);
      }

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', (e) => {
        if (!localStorage.getItem(THEME_KEY)) {
          applyTheme(e.matches ? 'dark' : 'light');
        }
      });

      // Event listeners
      btnAdd.addEventListener('click', openModalForAdd);
      btnCancel.addEventListener('click', closeModal);
      modal.addEventListener('close', closeModal);
      entryForm.addEventListener('submit', handleFormSubmit);

      document.body.addEventListener('click', (e) => {
        const editBtn = e.target.closest('.btn-edit');
        const deleteBtn = e.target.closest('.btn-delete');
        if (editBtn) {
          const id = Number(editBtn.getAttribute('data-id'));
          const entry = entries.find(e => e.id === id);
          if (entry) openModalForEdit(entry);
        }
        if (deleteBtn) {
          const id = Number(deleteBtn.getAttribute('data-id'));
          requestDelete(id);
        }
      });

      btnExport.addEventListener('click', exportData);
      btnImport.addEventListener('click', () => importFile.click());
      importFile.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
          requestImport(e.target.files[0]);
          importFile.value = '';
        }
      });

      btnConfirmCancel.addEventListener('click', closeModal);
      btnConfirmOk.addEventListener('click', handleConfirmOk);
      themeToggle.addEventListener('click', toggleTheme);

      loadFromStorage();
      renderTable();
      loadTheme();
    })();
  </script>
</body>
</html>
